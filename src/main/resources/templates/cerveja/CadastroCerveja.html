<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/LayoutPadrao}"
	xmlns:jamesbeer="http://www.jamesbeer.com.br/thymeleaf">

<head>
	<title>Cadastro de cerveja</title>
</head>

<body>
	
<section layout:fragment="conteudo">


			<div class="page-header">
				<div class="container-fluid">
					<h1>Cadastro de cerveja</h1>
				</div>
			</div>

		<div class="container-fluid">						<th:block th:include="fragments/MensagensSucesso"></th:block>						<form method="POST" th:object="${cerveja}" class="form-vertical  js-form-loading">			
			<th:block th:include="fragments/MensagensErroValidacao"></th:block>							<div class="row">					<div class="col-sm-2  form-group" jamesbeer:classforerror="sku">						<label for="sku" class="control-label">SKU</label> 						<input id="sku" type="text"	class="form-control" th:field="*{sku}"/>					</div>					<div class="col-sm-10  form-group" jamesbeer:classforerror="nome">						<label for="nome" class="control-label">Nome</label> 						<input id="nome" type="text" class="form-control" th:field="*{nome}"/>					</div>				</div>				<div class="form-group" jamesbeer:classforerror="descricao">					<label for="descricao" class="control-label">Descrição</label>					<textarea id="descricao" rows="3" class="form-control" th:field="*{descricao}"></textarea>				</div>				<div class="row">					<div class="col-sm-3  form-group" jamesbeer:classforerror="estilo">						<label for="estilo" class="control-label">Estilo</label>						<div class="jb-field-action">							<select id="estilo"	class="form-control" th:field="*{estilo}">								<option value="">Selecione o estilo</option>								<option th:each="estilo : ${estilos}" th:value="${estilo.codigo}" th:text="${estilo.nome}">Estilos</option>							</select>														<div class="jb-field-action__icon">								<a href="#" data-toggle="modal" data-target="#modalCadastroRapidoEstilo">									<i class="glyphicon glyphicon-plus-sign jb-glyphicon-large"></i>								</a>							</div>													</div>					</div>					<div class="col-sm-3  form-group" jamesbeer:classforerror="sabor">						<label for="sabor" class="control-label">Sabor</label> 						<select id="sabor" class="form-control" th:field="*{sabor}">							<option value="">Selecione o sabor</option>							<option th:each="sabor : ${sabores}" th:value="${sabor}" th:text="${sabor.descricao}">Sabor</option>						</select>											</div>					<div class="col-sm-3  form-group" jamesbeer:classforerror="teorAlcoolico">						<label for="teorAcoolico" class="control-label">Teor alcoólico</label>						<div class="input-group">							<input id="teorAcoolico" type="text" class="form-control js-decimal" th:field="*{teorAlcoolico}">							<div class="input-group-addon">%</div>						</div>					</div>					<div class="col-lg-3  col-sm-6  form-group" jamesbeer:classforerror="origem">						<label for="origem" class="control-label">Origem</label>						<div>							<th:block th:each="origem : ${origens}">								<div class="radio radio-inline">									<input th:id="|id_${origem}|" type="radio" th:value="${origem}"  th:field="*{origem}"/> 									<label th:for="|id_${origem}|" class="control-label" th:text="${origem.descricao}">Nacional</label>								</div>							</th:block>						</div>					</div>				</div>				<div class="row">					<div class="col-sm-3  form-group" jamesbeer:classforerror="valor">						<label for="valor" class="control-label">Valor</label>						<div class="input-group">							<div class="input-group-addon">R$</div>							<input id="valor" type="text" class="form-control js-decimal" th:field="*{valor}">						</div>					</div>					<div class="col-sm-3  form-group" jamesbeer:classforerror="comissao">						<label for="comissao" class="control-label">Comissão</label>						<div class="input-group">							<input id="comissao" type="text" class="form-control js-decimal" th:field="*{comissao}">							<div class="input-group-addon">%</div>						</div>					</div>					<div class="col-sm-3  form-group" jamesbeer:classforerror="quantidadeEstoque">						<label for="estoque" class="control-label">Estoque</label> 						<input id="estoque" type="text" class="form-control js-plain" th:field="*{quantidadeEstoque}"/>					</div>				</div>				<div class="form-group">					<button class="btn  btn-primary" type="submit">Salvar</button>				</div>			</form>		</div>				<div th:replace="/estilo/CadastroRapidoEstilo :: modal"></div>	</section>
	
	<th:block layout:fragment="javascript-extra">
	<script th:src="@{/javascripts/estilo.cadastro-rapido.js}"></script>
	</th:block>
</body>
</html>
