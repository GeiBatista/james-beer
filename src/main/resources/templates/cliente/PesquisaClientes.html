<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/LayoutPadrao}"
	xmlns:jamesbeer="http://www.jamesbeer.com.br/thymeleaf">

<head>
<title>Pesquisa de clientes</title>


</head>

<body>
	<section layout:fragment="conteudo">
		<div class="page-header">
			<div class="container-fluid">
				<div class="row">
					<div class="col-sm-10">
						<h1>Pesquisa de clientes</h1>
					</div>
					<div class="col-sm-2">
						<div class="aw-page-header-controls">
							<a class="btn  btn-default" th:href="@{/clientes/novo}"> <i
								class="glyphicon glyphicon-plus-sign"></i> <span
								class="hidden-xs hidden-sm">Novo cliente</span>
							</a>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="container-fluid">
			<form method="GET" th:object="${clienteFilter}"
				class="aw-form-pesquisa">

				<div class="row">
					<div class="form-group  col-sm-8">
						<label class="control-label" for="nome">Nome</label> <input
							type="text" class="form-control" id="nome" th:field="*{nome}" />
					</div>

					<div class="form-group  col-sm-4">
						<label class="control-label" for="cpfOuCnpj">CPF/CNPJ</label> <input
							type="text" class="form-control" id="cpfOuCnpj"
							th:field="*{cpfOuCnpj}" />
					</div>
				</div>

				<button type="submit" class="btn btn-primary">Pesquisar</button>
			</form>

			<div class="aw-table-responsive jb-tabela-simples">
				<table class="table table-hover">
					<thead>
						<tr>
							<th class="table-clientes-col-nome">
								<jamesbeer:order pagina="${pagina}" propriedade="nome" rotulo="Nome"/>
							</th>
							<th class="table-clientes-col-tipo-pessoa">
								<jamesbeer:order pagina="${pagina}" propriedade="tipoPessoa" rotulo="Tipo Pessoa"/>
							</th>
							<th class="table-clientes-col-cpfcnpj">CPF/CNPJ</th>
							<th class="table-clientes-col-telefone">Telefone</th>
							<th class="table-clientes-col-cidade-estado">Cidade/Estado</th>
							<th class="table-clientes-col-acoes"></th>
						</tr>
					</thead>

					<tbody>
						<tr th:each="cliente : ${pagina.conteudo}">
							<td th:text="${cliente.nome}">Gei</td>
							<td class="text-center" th:text="${cliente.tipoPessoa}">Física</td>
							<td class="text-right" th:text="${cliente.cpfOuCnpj}">12345678910</td>
							<td class="text-right" th:text="${cliente.telefone}">(71)9888-8888</td>
							<td class="text-right" th:text="${cliente.endereco.nomeCidadeSiglaEstado}">Salvador</td>
							<td class="text-center">
							<a class="btn btn-link btn-xs js-tooltip" title="Editar"> <i
									class="glyphicon glyphicon-pencil"></i>
							</a> <a class="btn btn-link btn-xs btn-excluir" title="Excluir">
									<i class="glyphicon glyphicon-remove"></i>
							</a></td>
						</tr>
						<tr th:if="${pagina.vazia}">
							<td colspan="7" class="text-center table-listas-vazias">Nenhum cliente encontrado</td>
						</tr>
					</tbody>
				</table>
			</div>
			<div class="col-sm-12 text-center" th:if="${not pagina.vazia}">
				<nav>
					<ul class="pagination pagination-sm" th:with="paginaAtual=${pagina.atual}">
						<li th:class="${pagina.primeira} ? disabled">
							<a th:href="${pagina.urlParaPagina(paginaAtual - 1)}" th:remove="${pagina.primeira} ? tag"><span>&laquo;</span></a>
						</li>
						
						<th:block th:each="p : ${#numbers.sequence(1, pagina.total)}" th:with="numeroPagina=${p - 1}">
							<li th:class="${paginaAtual == numeroPagina} ? active">
								<a th:href="${pagina.urlParaPagina(numeroPagina)}">[[${p}]]</a>
							</li>
						</th:block>
							
						<li th:class="${pagina.ultima} ? disabled">
							<a th:href="${pagina.urlParaPagina(paginaAtual + 1)}" th:remove="${pagina.ultima} ? tag"><span>&raquo;</span></a>
						</li>
					</ul>
				</nav>
			</div>
		</div>
	</section>
</body>
</html>
