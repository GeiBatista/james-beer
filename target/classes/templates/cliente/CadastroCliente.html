<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/LayoutPadrao}">

<head>
	<title>Cadastro de cliente</title>
</head>

<body>
	
<section layout:fragment="conteudo">


			<div class="page-header">
				<div class="container-fluid">
					<h1>Cadastro de clientes</h1>
				</div>
			</div>

			<div class="container-fluid">

				<!-- 	<div class="alert  alert-danger  alert-dismissible" role="alert"> -->
				<!-- 		<button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button> -->
				<!-- 		<i class="fa  fa-exclamation-circle"></i> Já existe um produto com o nome informado. -->
				<!-- 	</div> -->

				<form method="POST" th:object="${cliente}"
					class="form-vertical  js-form-loading">

					<div class="row">
						<div class="col-sm-12  form-group">
							<label for="nome">Nome</label> 
							<input id="nome" type="text" class="form-control" />
						</div>
					</div>
					
					<div class="row">
						<div class="col-lg-4 col-sm-6 form-group">
							<label for="tipoPessoa">Tipo pessoa</label>
							<div>
								<div class="radio radio-inline">
									<input id="id_FISICA" type="radio" class="js-radio-tipo-pessoa" 
									name="tipoPessoa" data-documento="CPF" data-mascara="000.000.000-00">
									<label class="control-label" for="id_FISICA">Física</label>
								</div>
								<div class="radio radio-inline">
									<input id="id_JURIDICA" type="radio" class="js-radio-tipo-pessoa" 
									name="tipoPessoa" data-documento="CNPJ" data-mascara="00.000.000/0000-00">
									<label class="control-label" for="id_JURIDICA">Jurídica</label>
								</div>
							</div>					
						</div>					
						<div class="col-lg-8 col-sm-6 form-group">
							<label for="cpfOuCnpj">CPF/CNPJ</label>
							<input id="cpfOuCnpj" type="text" class="form-control" disabled>
						</div>
					</div>
					
					<div class="row">
						<div class="col-lg-4 form-group" >
							<label for="telefone">Telefone</label>
							<input id="telefone" type="text" class="form-control js-phone-number">						
						</div>
						<div class="col-lg-8">
							<label for="email">E-mail</label>
							<input id="email" type="text" class="form-control">
						</div>
					</div>
					
					<div class="row">
						<div class="col-lg-4 form-group">
							<label for="logradouro">Logradouro</label>
							<input id="logradouro" type="text" class="form-control">
						</div>
						<div class="col-lg-4 form-group">
							<label for="numero">Número</label>
							<input id="numero" type="text" class="form-control">
						</div>
						<div class="col-lg-4 form-group">
							<label for="complemento">Complemento</label>
							<input id="complemento" type="text" class="form-control">
						</div>
					</div>

					<div class="row">
						<div class="col-lg-4 form-group">
							<label for="cep">CEP</label>
							<input id="cep" type="text" class="form-control">
						</div>
						<div class="col-sm-4  form-group">
							<label for="estado">Estado</label>
							<div class="jb-field-action">
								<select id="estado" class="form-control">
									<option value="">Selecione o estado</option>
									<option value="1">BA</option>
								</select>
							</div>
						</div>
						<div class="col-sm-4  form-group">
							<label for="cidade">Cidade</label> 
								<select id="cidade" class="form-control">
									<option value="">Selecione a cidade</option>
									<option value="1">Salvador</option>
								</select>							
						</div>
					</div>

					<div class="form-group">
						<button class="btn  btn-primary" type="submit">Salvar</button>
					</div>
				</form>
			</div>
			
			<div th:replace="/estilo/CadastroRapidoEstilo :: modal"></div>
			
		</section>
		
		<th:block layout:fragment="javascript-extra">
            <script th:src="@{/javascripts/cliente.mascara-cpf-cnpj.js}"></script>
        </th:block>
</body>
</html>
