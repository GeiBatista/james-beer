<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/LayoutPadrao}"
	xmlns:jamesbeer="http://www.jamesbeer.com.br/thymeleaf">

<head>
	<title>Cadastro de cidade</title>
</head>

<body>
	
<section layout:fragment="conteudo">


			<div class="page-header">
				<div class="container-fluid">
					<h1>Cadastro de cidade</h1>
				</div>
			</div>

			<div class="container-fluid">

				<!-- 	<div class="alert  alert-danger  alert-dismissible" role="alert"> -->
				<!-- 		<button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button> -->
				<!-- 		<i class="fa  fa-exclamation-circle"></i> Já existe um produto com o nome informado. -->
				<!-- 	</div> -->

				<form method="POST" th:object="${cidade}"
					class="form-vertical  js-form-loading">
					<jamesbeer:message />

					<div class="row">
						<div class="col-sm-4  form-group jb-required" jamesbeer:classforerror="estado">
							<label for="estado" class="control-label">Estado</label>
							<div class="jb-field-action">
								<select id="estado" class="form-control" th:field="*{estado}">
									<option value="">Selecione o estado</option>
									<option th:each="estado : ${estados}" th:value="${estado.codigo}" th:text="${estado.nome}">BA</option>
								</select>
							</div>
						</div>
						<div class="col-sm-8  form-group jb-required" jamesbeer:classforerror="nome">
							<label for="nome" class="control-label">Nome</label> 
							<input id="nome" type="text" class="form-control" th:field="*{nome}"/>
						</div>
					</div>

					<div class="form-group">
						<button class="btn  btn-primary" type="submit">Salvar</button>
					</div>
				</form>
			</div>
			
			<div th:replace="/estilo/CadastroRapidoEstilo :: modal"></div>
			
		</section>
		
		<th:block layout:fragment="javascript-extra">
		</th:block>

</body>
</html>
