<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/LayoutPadrao}"
	xmlns:jamesbeer="http://www.jamesbeer.com.br/thymeleaf"
	xmlns:data="http://www.thymeleaf.org/extras/data"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity4">

<head>
	<title>Pesquisa de Cidades</title>
</head>

<body>
	<section layout:fragment="conteudo">
		<div class="page-header">
			<div class="container-fluid">
				<div class="row">
					<div class="col-sm-10">
						<h1>Pesquisa de cidades</h1>
					</div>
					
					<div class="col-sm-2" sec:authorize-url="/cidades/nova">
						<div class="aw-page-header-controls">
							<a class="btn  btn-default" th:href="@{/cidades/nova}"> 
								<i class="glyphicon glyphicon-plus-sign"></i> <span	class="hidden-xs hidden-sm">Nova cidade</span>
							</a>
						</div>
					</div>
				</div>
			</div>
		</div>			
		
		<div class="container-fluid" >
			<form method="GET" th:object="${cidadeFilter}">
				<div class="row">
					<div class="col-sm-4  form-group">
						<label for="estado">Estado</label> 
						<select id="estado" class="form-control" th:field="*{estado}">
							<option value="">Todos</option>
							<option th:each="estado : ${estados}" th:value="${estado.codigo}" th:text="${estado.nome}">Bahia</option>
						</select>
					</div>
					
					<div class="col-sm-8  form-group">
						<label for="nome">Nome</label>
						<input type="text" class="form-control" id="nome" th:field="*{nome}"/>
					</div>
				</div>

				<button type="submit" class="btn  btn-primary" >Pesquisar</button>
			</form>
		
		<div class="aw-table-responsive jb-tabela-simples">
			<table class="table table-hover">
				<thead>
					<tr>
						<th class="table-cidades-col-nome">
							<jamesbeer:order pagina="${pagina}" propriedade="nome" rotulo="Nome"/>
						</th>
						<th class="table-cidades-col-estado">
							<jamesbeer:order pagina="${pagina}" propriedade="estado" rotulo="Estado"/>
						</th>
						<th class="table-col-acoes" sec:authorize="hasRole('ROLE_CADASTRAR_CIDADE')"></th>
					</tr>
				</thead>
	             
	             <tbody>
             		<tr th:each="cidade : ${pagina.conteudo}">
             			<td th:text="${cidade.nome}"></td>
             			<td class="text-right" th:text="${cidade.estado.nome}">Bahia</td>
             			 <td class="text-center" sec:authorize="hasRole('ROLE_CADASTRAR_CIDADE')">
                           	<a class="btn btn-link btn-xs js-tooltip" title="Editar">
                           		<i class="glyphicon glyphicon-pencil"></i>
                           	</a>
                           	<a class="btn btn-link btn-xs btn-excluir" title="Excluir">
                           		<i class="glyphicon glyphicon-remove"></i>
                           	</a>
                        </td>	
	             	</tr>
	             	<tr th:if="${pagina.vazia}">
                        	<td colspan="7" class="text-center table-listas-vazias">Nenhuma Cidade encontrada</td>
                   	</tr>
	             </tbody>
			</table>
		</div>
		
		<div class="col-sm-12 text-center" th:if="${not pagina.vazia}">
			<nav>
				<ul class="pagination pagination-sm" th:with="paginaAtual=${pagina.atual}">
					<li th:class="${pagina.primeira} ? disabled">
						<a th:href="${pagina.urlParaPagina(paginaAtual - 1)}" th:remove="${pagina.primeira} ? tag"><span>&laquo;</span></a>
					</li>
					<th:block th:each="p : ${#numbers.sequence(1, pagina.total)}" th:with="numeroPagina=${p - 1}">
						<li th:class="${paginaAtual == numeroPagina} ? active">
							<a th:href="${pagina.urlParaPagina(numeroPagina)}">[[${p}]]</a>
						</li>
					</th:block>
					<li th:class="${pagina.ultima} ? disabled">
						<a th:href="${pagina.urlParaPagina(paginaAtual + 1)}" th:remove="${pagina.ultima} ? tag"><span>&raquo;</span></a>
					</li>
				</ul>
			</nav>
		</div>
		
		<!-- <jamesbeer:pagination pagina="${pagina}"/> -->
	</div>	
	</section>
</body>
</html>
